name: Docker Image CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DOCKERPASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}/myapp:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERUSERNAME }}/myapp:${{ github.sha }} ${{ secrets.DOCKERUSERNAME }}/myapp:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/myapp:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME }}/myapp:latest
